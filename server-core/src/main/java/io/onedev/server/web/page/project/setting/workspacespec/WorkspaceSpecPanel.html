<wicket:panel>
	<div class="workspace-spec card">
		<div class="card-header">
			<div class="card-title">
				<a class="toggle" onclick="$(this).closest('.workspace-spec').toggleClass('expanded');"><wicket:svg href="arrow4" class="icon rotate-270"/></a>
				<span class="drag-indicator"><wicket:svg href="grip" class="icon icon-lg mr-2"/></span>
				<span wicket:id="name" class="mr-3"></span>
				<a wicket:id="edit" onclick="$(this).closest('.workspace-spec').addClass('expanded');" class="btn btn-xs btn-icon btn-light btn-hover-primary mr-2" t:data-tippy-content="Edit this spec"><wicket:svg href="edit" class="icon"></wicket:svg></a>
				<a wicket:id="delete" class="btn btn-xs btn-icon btn-light btn-hover-danger mr-4" t:data-tippy-content="Delete this spec"><wicket:svg href="trash" class="icon"></wicket:svg></a>
			</div>
		</div>
		<div class="card-body">
			<div wicket:id="spec"></div>
		</div>
	</div>
</wicket:panel>
