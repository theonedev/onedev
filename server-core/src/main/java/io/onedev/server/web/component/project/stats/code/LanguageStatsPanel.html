<wicket:panel>
	<div class="language-stats">
		<div class="language-stats-bar">
			<span wicket:id="bars"></span>
		</div>
		<ul class="language-stats-legend list-unstyled mb-0">
			<li wicket:id="languages" class="d-inline-flex align-items-center mr-3 mb-1">
				<span wicket:id="dot" class="language-stats-dot mr-1"></span>
				<span wicket:id="name" class="font-weight-bold mr-1"></span>
				<span wicket:id="percent" class="text-muted"></span>
			</li>
		</ul>
	</div>
</wicket:panel>
