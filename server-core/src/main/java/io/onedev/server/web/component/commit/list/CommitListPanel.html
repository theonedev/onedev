<wicket:panel>
	<div class="commit-list card no-autofocus">
		<div class="card-body">
			<form wicket:id="query" class="clearable-wrapper mb-4">
				<div class="input-group">
					<input wicket:id="input" spellcheck="false" autocomplete="off" class="form-control" t:placeholder="Query commits">
					<span class="input-group-append">
						<button wicket:id="submit" t:data-tippy-content="Query" type="submit" class="btn btn-outline-secondary btn-icon"><wicket:svg href="magnify" class="icon"></wicket:svg></button>
					</span>
				</div>
			</form>
			<div class="mb-4">
				<a wicket:id="showSavedQueries" class="show-saved-queries text-gray d-inline-block mb-2 mr-4">
					<wicket:svg href="eye" class="icon"></wicket:svg> <wicket:t>Show Saved Queries</wicket:t>
				</a>
				<a wicket:id="saveQuery" class="save-query text-gray d-inline-block mb-2 mr-4">
					<wicket:svg href="save" class="icon"></wicket:svg> <wicket:t>Save Query</wicket:t>
				</a>
				<a wicket:id="filter" class="filter text-gray mr-4 mb-2 d-inline-block text-nowrap">
					<wicket:svg href="filter" class="icon"></wicket:svg> <wicket:t>Filter</wicket:t>
				</a>
			</div>
	        <div wicket:id="body" class="body resize-aware">
	            <div wicket:id="feedback"></div>
	            <ul class="list list-unstyled">
	                <li wicket:id="commits" class="d-flex align-items-start"></li>
	            </ul>
	            <div wicket:id="noCommits" class="no-commits"></div>
	        </div>
	        <div wicket:id="foot" class="foot text-center">
	            <a wicket:id="more" class="btn btn-primary"><wicket:t>More commits</wicket:t></a>
	            <div wicket:id="tooMany" class="mt-4 mb-0 alert alert-light-warning"><wicket:t>Too many commits to load</wicket:t></div>
	        </div>
		</div>
	</div>
	<wicket:fragment wicket:id="commitFrag">
		<div class="avatar mr-3">
			<span wicket:id="avatar"></span>
		</div>
		<div class="detail mt-n1">
			<div class="message-and-labels d-flex align-items-start flex-wrap">
				<div>
					<span wicket:id="message" class="message mr-2 d-inline-block"></span>
					<wicket:enclosure>
					<a wicket:id="compare" t:data-tippy-content="Compare with base revision" class="mr-2"><wicket:svg href="diff" class="icon"></wicket:svg></a>
					</wicket:enclosure>
					<a wicket:id="signature" class="mr-2"></a>
					<a wicket:id="buildStatus" class="build-status mr-2"></a>
					<a wicket:id="workspaces" class="mr-2 text-nowrap" t:data-tippy-content="Workspaces at this commit"><wicket:svg href="workspace" class="icon"/> <wicket:svg href="arrow" class="icon rotate-90"/></a>	
				</div>
				<div class="labels">
					<wicket:container wicket:id="labels">
						<span wicket:id="label" class="badge badge-info badge-sm mr-2"></span>
					</wicket:container>
				</div>
			</div>
			<div wicket:id="contribution"></div>
		</div>
		<div class="btn-group hash d-none d-xl-flex ml-auto actions">
			<a wicket:id="hashLink" class="btn btn-outline-secondary hash" t:data-tippy-content="Browse code"><span wicket:id="hash"></span></a>
			<a wicket:id="copyHash" class="btn btn-outline-secondary btn-icon"><wicket:svg href="copy" class="icon"></wicket:svg></a>
		</div>
	</wicket:fragment>
	<wicket:fragment wicket:id="dateFrag">
		<wicket:svg href="calendar" class="icon icon-lg mr-2"></wicket:svg> <span wicket:id="date"></span>
	</wicket:fragment>
</wicket:panel>
