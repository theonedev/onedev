<wicket:extend>
	<div class="project-overview p-2 p-sm-5">
		<div class="card mb-4">
			<div class="card-body">
				<div wicket:id="summary" class="summary d-flex">
					<img wicket:id="avatar" class="mr-3 flex-shrink-0">
					<div class="details flex-grow-1">
						<div class="d-flex flex-wrap align-items-center row-gap-1">
							<span wicket:id="path" class="path mb-0 mr-2 h2 text-truncate"></span>
							<wicket:enclosure child="forkInfo">
							<span wicket:id="forkInfo" class="btn-group fork-info flex-shrink-0 ml-sm-auto">
							    <a wicket:id="forks" class="btn btn-sm btn-outline-secondary btn-hover-primary"><span wicket:id="label"></span></a>
								<a wicket:id="forkNow" class="btn btn-sm btn-outline-secondary btn-hover-primary btn-icon" t:data-tippy-content="Fork now"><wicket:svg href="fork" class="icon"/></a>
							</span>
							</wicket:enclosure>
						</div>
						<span wicket:id="labels" class="mt-2"></span>
						<div wicket:id="description" class="text-muted mt-2"></div>
						<div class="font-size-lg font-weight-bold mt-2">
							<span wicket:id="id"></span><span wicket:id="key"></span><wicket:enclosure child="forkedFrom"> · <wicket:t>forked from <a wicket:id="forkedFrom"></a></wicket:t></wicket:enclosure>
						</div>
						<wicket:enclosure child="serviceDesk">
						<div class="mt-2">
							<a wicket:id="serviceDesk" t:data-tippy-content="Issues can be created in this project by sending email to this address"><wicket:svg href="mail" class="icon"></wicket:svg> <span wicket:id="label"></span></a>
						</div>
						</wicket:enclosure>
						<div wicket:id="replicas"></div>
						<div wicket:id="entityStats"></div>
					</div>
				</div>
				<div wicket:id="languageStats" class="section"></div>
				<div wicket:id="nextIteration" class="section"></div>
			</div>
		</div>
		<div wicket:id="children" class="card children">
			<div class="card-header">
				<div class="card-title mb-0"><wicket:t>Child Projects</wicket:t></div>
			</div>
			<div class="card-body">
				<div wicket:id="body"></div>
			</div>
		</div>
	</div>
	<wicket:fragment wicket:id="entityStatsFrag">
		<div class="d-flex flex-wrap">
			<div wicket:id="codeStats" class="mt-3 d-flex align-items-center flex-wrap mr-3"></div>
			<div wicket:id="pullRequestStats" class="mt-3 d-flex align-items-center flex-wrap"></div>
			<div wicket:id="workspaceStats" class="mt-3 d-flex align-items-center flex-wrap mr-3"></div>
		</div>
		<div class="d-flex flex-wrap">
			<div wicket:id="issueStats" class="mt-3 d-flex align-items-center flex-wrap mr-3"></div>
			<div wicket:id="buildStats" class="mt-3 d-flex align-items-center flex-wrap mr-3"></div>
			<div wicket:id="packStats" class="mt-3 d-flex align-items-center flex-wrap"></div>
		</div>
	</wicket:fragment>
	<wicket:fragment wicket:id="languageStatsFrag">
		<div class="font-weight-bolder font-size-lg mb-2">
			<span wicket:id="title"></span>
		</div>
		<div wicket:id="statsBar"></div>
	</wicket:fragment>
	<wicket:fragment wicket:id="nextIterationFrag">
		<div class="font-weight-bolder font-size-lg mb-2">
			<a wicket:id="title"><span wicket:id="label"></span></a>
		</div>
		<div wicket:id="statsBar"></div>
	</wicket:fragment>
	<wicket:fragment wicket:id="replicasFrag">
		<div class="mt-3 d-flex flex-wrap align-items-center">
			<span wicket:id="replicas" class="d-flex flex-nowrap align-items-center text-nowrap mr-3 mb-1">
				<wicket:svg href="server" class="icon mr-1"></wicket:svg>
				<span wicket:id="server"></span>
				<a wicket:id="sync" class="ml-1" t:data-tippy-content="Request to sync"><wicket:svg href="refresh" class="icon"/></a>
			</span>
		</div>
	</wicket:fragment>
</wicket:extend>
